name: Build and Release genome-miner

on:
  push:
    tags:
      - 'v.*.*.*-stratum'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v.1.0.1-stratum)'
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: genome-miner-linux-x86_64
            binary: genome-miner
            archive_ext: tar.gz

          - os: macos-latest      # arm64 runner, cross-compile to Intel x86_64
            target: x86_64-apple-darwin
            artifact: genome-miner-macos-x86_64
            binary: genome-miner
            archive_ext: tar.gz

          - os: macos-latest      # Apple Silicon (M1/M2/M3/M4)
            target: aarch64-apple-darwin
            artifact: genome-miner-macos-aarch64
            binary: genome-miner
            archive_ext: tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: genome-miner-windows-x86_64
            binary: genome-miner.exe
            archive_ext: zip

    runs-on: ${{ matrix.os }}
    env:
      MINER_VER: "0.15.5"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Linux deps (skipped — handled inside Docker) ─────────────────────────
      - name: Install Linux build dependencies
        if: runner.os == 'Linux' && matrix.target != 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler \
            libvulkan-dev \
            vulkan-tools

      # ── macOS deps ──────────────────────────────────────────────────────────
      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install protobuf

      # ── Windows deps ────────────────────────────────────────────────────────
      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install protoc --yes

      - name: Verify protoc installation
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        run: protoc --version

      # ── Rust toolchain (non-Linux: handled inside Docker for Linux) ────────────
      - name: Install Rust stable
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── Cargo caches ────────────────────────────────────────────────────────
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-registry-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-build-

      # ── Build (macOS / Windows) ──────────────────────────────────────────────
      - name: Build genome-miner (release)
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        run: cargo build --release --package genome-miner --target ${{ matrix.target }}

      # ── Build (Linux — Ubuntu 20.04 Docker for glibc 2.31 / HiveOS compat) ────
      - name: Build genome-miner (Ubuntu 20.04 Docker)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.cargo/registry:/root/.cargo/registry" \
            -w /workspace \
            ubuntu:20.04 \
            bash -c "
              set -e
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                curl ca-certificates build-essential pkg-config libssl-dev \
                protobuf-compiler libvulkan-dev
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
                sh -s -- -y --default-toolchain stable --no-modify-path
              export PATH=\"\$HOME/.cargo/bin:\$PATH\"
              cargo build --release --package genome-miner --target x86_64-unknown-linux-gnu
            "

      # ── Package (Linux / macOS) ──────────────────────────────────────────────
      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN=target/${{ matrix.target }}/release/${{ matrix.binary }}
          OUTDIR=dist/${{ matrix.artifact }}
          mkdir -p "$OUTDIR"
          cp "$BIN" "$OUTDIR/${{ matrix.binary }}"
          cd dist
          tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}/
          echo "Created dist/${{ matrix.artifact }}.tar.gz"

      # ── HiveOS package (Linux only) ──────────────────────────────────────────
      - name: Build HiveOS package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          BIN=target/${{ matrix.target }}/release/genome-miner
          HIVEOS_DIR=dist/hiveos-pkg
          mkdir -p "$HIVEOS_DIR"

          # Binary
          cp "$BIN" "$HIVEOS_DIR/genome-miner"
          chmod 755 "$HIVEOS_DIR/genome-miner"

          # HiveOS integration scripts + manifest
          cp integrations/hiveos/h-config.sh   "$HIVEOS_DIR/"
          cp integrations/hiveos/h-run.sh      "$HIVEOS_DIR/"
          cp integrations/hiveos/h-stats.sh    "$HIVEOS_DIR/"
          cp integrations/hiveos/install.sh    "$HIVEOS_DIR/"
          cp integrations/hiveos/h-manifest.conf "$HIVEOS_DIR/"
          chmod 755 "$HIVEOS_DIR"/*.sh
          # Stamp the exact build version into the manifest
          sed -i "s/CUSTOM_VERSION=.*/CUSTOM_VERSION=\"${MINER_VER}\"/" "$HIVEOS_DIR/h-manifest.conf"

          # Create archive: genome-miner-<ver>.tar.gz  (HiveOS URL format)
          cd dist
          tar -czf genome-miner-${MINER_VER}.tar.gz -C hiveos-pkg .
          echo "Created dist/genome-miner-${MINER_VER}.tar.gz"

      - name: Upload HiveOS artifact
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: genome-miner-hiveos
          path: dist/genome-miner-${{ env.MINER_VER }}.tar.gz

      # ── Package (Windows) ───────────────────────────────────────────────────
      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin    = "target/${{ matrix.target }}/release/${{ matrix.binary }}"
          $outdir = "dist/${{ matrix.artifact }}"
          New-Item -ItemType Directory -Force -Path $outdir | Out-Null
          Copy-Item $bin "$outdir/${{ matrix.binary }}"
          Compress-Archive -Path $outdir -DestinationPath "dist/${{ matrix.artifact }}.zip"
          Write-Host "Created dist/${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.${{ matrix.archive_ext }}

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List artifacts
        run: find dist/ -type f

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine version
        id: ver
        run: |
          VER=$(grep -m1 '^version' Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')
          echo "ver=${VER}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "genome-miner ${{ steps.tag.outputs.tag }}"
          body: |
            ## genome-miner ${{ steps.tag.outputs.tag }}

            Xenomorph GPU miner — Genome PoW + KHeavyHash.
            Supports **NVIDIA** (Vulkan), **AMD** (Vulkan), **Apple M** (Metal).

            ---

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | **HiveOS / Ubuntu 20** | `genome-miner-*-hiveos.tar.gz` | includes h-run/h-stats/h-config/install.sh |
            | Linux x86_64 | `genome-miner-linux-x86_64.tar.gz` | generic binary only |
            | macOS x86_64 (Intel) | `genome-miner-macos-x86_64.tar.gz` | |
            | macOS aarch64 (Apple M) | `genome-miner-macos-aarch64.tar.gz` | |
            | Windows x86_64 | `genome-miner-windows-x86_64.zip` | |

            ---

            ### HiveOS — Install (one command)
            ```bash
            # On your HiveOS rig (as root):
            mkdir -p /hive/miners/genome-miner
            cd /tmp && wget -q https://github.com/hainakus/Xenomorph/releases/download/${{ steps.tag.outputs.tag }}/genome-miner-${{ steps.ver.outputs.ver }}-hiveos.tar.gz
            tar -xzf genome-miner-${{ steps.ver.outputs.ver }}-hiveos.tar.gz -C /hive/miners/genome-miner/
            bash /hive/miners/genome-miner/install.sh
            ```
            > `install.sh` automatically downloads the **GRCh38 genome dataset (~780 MB)**
            > from `https://github.com/hainakus/Xenomorph/releases/download/genome-grch38-v0/grch38.xenom`
            > with resume support. Re-run safely if interrupted.

            ### HiveOS — Flight Sheet
            | Field | Value |
            |-------|-------|
            | Miner | Custom |
            | Miner name | `genome-miner` |
            | Installation URL | *(leave blank — use manual install above)* |
            | Wallet | `xenom:<your-reward-address>` |
            | Pool URL | `<your-node-ip>:36669` |
            | Extra config | `--mainnet` *(add `--gpu all` for multi-GPU)* |

            ### Linux / macOS quick start
            ```bash
            tar -xzf genome-miner-<platform>.tar.gz
            # genome file is auto-downloaded on first start, or pre-place it:
            mkdir -p ~/.rusty-xenom
            wget -c https://github.com/hainakus/Xenomorph/releases/download/genome-grch38-v0/grch38.xenom \
              -O ~/.rusty-xenom/grch38.xenom
            ./genome-miner gpu \
              --mining-address xenom:<your-address> \
              --rpcserver <node-ip>:36669 \
              --mainnet
            ```

            ### Windows quick start
            ```powershell
            Expand-Archive genome-miner-windows-x86_64.zip
            .\genome-miner.exe gpu `
              --mining-address xenom:<your-address> `
              --rpcserver <node-ip>:36669 `
              --mainnet
            ```

            ### Stats API (HiveOS compatible)
            The miner exposes a stats API on port `4000` (disable with `--api-port 0`):
            ```bash
            curl http://<rig-ip>:4000/
            ```

            > Full HiveOS setup guide: [docs/hiveos-install.md](https://github.com/hainakus/Xenomorph/blob/master/docs/hiveos-install.md)
          files: |
            dist/genome-miner-hiveos/genome-miner-${{ steps.ver.outputs.ver }}.tar.gz
            dist/genome-miner-linux-x86_64/genome-miner-linux-x86_64.tar.gz
            dist/genome-miner-macos-x86_64/genome-miner-macos-x86_64.tar.gz
            dist/genome-miner-macos-aarch64/genome-miner-macos-aarch64.tar.gz
            dist/genome-miner-windows-x86_64/genome-miner-windows-x86_64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
